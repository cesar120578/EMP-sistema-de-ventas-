<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viveros RDM.empl.1.0</title>

<style>
body{
    background:black;
    color:gold;
    font-family:Arial;
    text-align:center;
}
.logo{
    font-size:26px;
    font-weight:bold;
    margin-top:10px;
}
.section{
    width:90%;
    margin:25px auto;
    border:1px solid gold;
    border-radius:10px;
    padding:20px;
}
h2{
    cursor:pointer;
    border-bottom:1px solid gold;
    padding-bottom:8px;
}
.hidden{ display:none; }

input,select,button{
    padding:8px;
    margin:6px;
    border-radius:6px;
    border:none;
}
button{
    background:gold;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
button:hover{ background:#d4af37; }

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
th,td{
    border:1px solid gold;
    padding:8px;
}

/* CONFIRMACIÓN VISUAL */
#mensajeVenta{
    margin-top:10px;
    padding:8px;
    border-radius:8px;
    background:#1e4620;
    color:#7CFC00;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="logo">🌿 VIVEROS RDM 🌿</div>

<!-- LOGIN -->
<div class="section" id="loginDiv">
<h2>Ingreso Empleado</h2>
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="clave" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<p id="error"></p>
</div>

<div id="sistema" class="hidden">

<div>
Empleado activo: <span id="empleadoActivo"></span><br>
Hora de entrada: <span id="horaEntrada"></span>
</div>

<!-- STOCK -->
<div class="section">
<h2 onclick="toggle('stockBox')">📦 Stock Disponible</h2>
<div id="stockBox" class="hidden">

<table>
<thead>
<tr>
<th>Planta</th>
<th>Precio</th>
<th>Stock</th>
</tr>
</thead>
<tbody id="tablaStock"></tbody>
</table>

</div>
</div>

<!-- VENTAS -->
<div class="section">
<h2 onclick="toggle('ventaBox')">💰 Registrar Venta</h2>
<div id="ventaBox" class="hidden">

<select id="plantaVenta"></select>
<input type="number" id="cantidadVenta" placeholder="Cantidad">

<button onclick="mostrarDescuento()">Solicitar descuento</button>

<div id="descuentoBox" class="hidden">
<input type="password" id="claveDescuento" placeholder="Clave autorizada">
<button onclick="activarDescuento()">Aplicar</button>
</div>

<p>Precio actual: $<span id="precioActual">0</span></p>
<p>Total a cobrar: $<span id="totalCobro">0</span></p>

<button onclick="registrarVenta()">Confirmar Venta</button>

<p id="mensajeVenta" class="hidden"></p>

</div>
</div>

<!-- TOTAL -->
<div class="section">
<h2>Total vendido hoy: $<span id="totalDia">0</span></h2>
<button onclick="cerrarDia()">Registrar Cierre</button>
<p id="cierreInfo"></p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSZucWCiY1C24XTVDu1MtC0ZRWZjmHSC0",
  authDomain: "sistema-vivero.firebaseapp.com",
  databaseURL: "https://sistema-vivero-default-rtdb.firebaseio.com",
  projectId: "sistema-vivero",
  storageBucket: "sistema-vivero.firebasestorage.app",
  messagingSenderId: "325664184257",
  appId: "1:325664184257:web:8af25c6bdb65b51623c140"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* EMPLEADOS */
const empleados = ["Emp1","Emp2","Emp3"];
const claveEmpleado = "ViverosRDMempl";

/* DATOS */
let plantas = {};
let ventas = [];
let descuentosAutorizados = {};
let empleadoActual = null;
let precioModificado = null;

/* TOGGLE IGUAL QUE ADMIN */
window.toggle = function(id){
    document.getElementById(id).classList.toggle("hidden");
}

/* TIEMPO REAL */
function escucharCambios(){
    const dbRef = ref(db);
    onValue(dbRef, (snapshot) => {
        if(snapshot.exists()){
            const data = snapshot.val();
            plantas = data.plantas || {};
            ventas = data.ventas || [];
            descuentosAutorizados = data.descuentos || {};
            cargarStock();
            actualizarSelect();
            calcularTotalDia();
        }
    });
}

/* LOGIN */
window.login = function(){
    let user = usuario.value;
    let pass = clave.value;

    if(!empleados.includes(user) || pass !== claveEmpleado){
        error.innerText="Credenciales incorrectas";
        return;
    }

    empleadoActual = user;

    horaEntrada.innerText = new Date().toLocaleString();
    empleadoActivo.innerText = user;

    loginDiv.classList.add("hidden");
    sistema.classList.remove("hidden");

    escucharCambios();
}

/* STOCK ORDENADO EN TABLA */
function cargarStock(){
    tablaStock.innerHTML="";
    let nombres = Object.keys(plantas).sort((a,b)=>a.localeCompare(b));
    nombres.forEach(nombre=>{
        tablaStock.innerHTML += `
        <tr>
            <td>${nombre}</td>
            <td>$${plantas[nombre].precio}</td>
            <td>${plantas[nombre].inventario}</td>
        </tr>`;
    });
}

function actualizarSelect(){
    plantaVenta.innerHTML="";
    for(let nombre in plantas){
        let option=document.createElement("option");
        option.value=nombre;
        option.text=nombre;
        plantaVenta.appendChild(option);
    }
    actualizarPrecio();
}

plantaVenta.addEventListener("change", actualizarPrecio);
cantidadVenta.addEventListener("input", calcularTotal);

function actualizarPrecio(){
    let nombre=plantaVenta.value;
    if(!plantas[nombre]) return;
    precioModificado=plantas[nombre].precio;
    precioActual.innerText=precioModificado;
    calcularTotal();
}

function calcularTotal(){
    let cantidad=parseInt(cantidadVenta.value)||0;
    totalCobro.innerText=cantidad*precioModificado;
}

/* DESCUENTO */
window.mostrarDescuento=function(){
    descuentoBox.classList.toggle("hidden");
}

window.activarDescuento=function(){
    let claveIngresada=claveDescuento.value;
    let nombre=plantaVenta.value;

    if(descuentosAutorizados[nombre] && descuentosAutorizados[nombre].clave===claveIngresada){
        precioModificado=descuentosAutorizados[nombre].nuevoPrecio;
        precioActual.innerText=precioModificado;
        calcularTotal();
        alert("Descuento aplicado");
    } else alert("Clave incorrecta o no autorizada");
}

/* REGISTRAR VENTA */
window.registrarVenta=async function(){
    let nombre=plantaVenta.value;
    let cantidad=parseInt(cantidadVenta.value);

    if(!plantas[nombre]||cantidad<=0) return;
    if(plantas[nombre].inventario<cantidad) return;

    plantas[nombre].inventario-=cantidad;

    let venta={
        nombre,
        cantidad,
        precio:precioModificado,
        total:cantidad*precioModificado,
        fecha:new Date().toLocaleString(),
        empleado:empleadoActual
    };

    ventas.push(venta);

    await update(ref(db),{ plantas, ventas });

    let mensaje=mensajeVenta;
    mensaje.innerText="✅ Venta registrada correctamente";
    mensaje.classList.remove("hidden");
    setTimeout(()=>mensaje.classList.add("hidden"),3000);

    alert("Venta registrada");
}

/* TOTAL DIA */
function calcularTotalDia(){
    let hoy=new Date().toLocaleDateString();
    let total=ventas
    .filter(v=>new Date(v.fecha).toLocaleDateString()===hoy)
    .reduce((sum,v)=>sum+v.total,0);

    totalDia.innerText=total;
}

/* CIERRE */
window.cerrarDia=function(){
    cierreInfo.innerText="Cierre registrado: "+new Date().toLocaleString();
}

</script>
</body>
</html>
