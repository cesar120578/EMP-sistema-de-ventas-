<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viveros RDM.empl.1.0</title>

<style>
body{
    font-family: Arial;
    background:#000;
    color:#d4af37;
    text-align:center;
    margin:0;
}
.container{
    background:#111;
    width:90%;
    max-width:900px;
    margin:25px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(212,175,55,0.4);
}
input, select, button{
    padding:10px;
    margin:6px;
    width:85%;
    border-radius:8px;
    border:1px solid #d4af37;
    background:#000;
    color:#d4af37;
}
button{
    background:#d4af37;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
button:hover{
    background:#f0c75e;
}
.hidden{ display:none; }
table{
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
}
th, td{
    border:1px solid #d4af37;
    padding:8px;
}
h3{
    cursor:pointer;
}
</style>
</head>

<body>

<h2>🌿 Viveros RDM.empl.1.0</h2>

<div class="container" id="loginDiv">
<h3>Ingreso Empleado</h3>
<input type="text" id="usuario">
<input type="password" id="clave">
<button onclick="login()">Entrar</button>
<p id="error"></p>
</div>

<div class="container hidden" id="sistema">

<p>Empleado: <span id="empleadoActivo"></span></p>
<p>Hora de entrada: <span id="horaEntrada"></span></p>

<hr>

<!-- STOCK RETRÁCTIL -->
<h3 onclick="toggleSeccion('stockBox')">📦 Stock Disponible</h3>
<div id="stockBox" class="hidden">
    <div id="stock"></div>
</div>

<hr>

<!-- VENTA RETRÁCTIL -->
<h3 onclick="toggleSeccion('ventaBox')">💰 Registrar Venta</h3>
<div id="ventaBox" class="hidden">

<select id="plantaVenta"></select>
<input type="number" id="cantidadVenta" placeholder="Cantidad">

<button onclick="mostrarDescuento()">Solicitar descuento</button>

<div id="descuentoBox" class="hidden">
<input type="password" id="claveDescuento" placeholder="Clave autorizada">
<button onclick="activarDescuento()">Aplicar</button>
</div>

<p>Precio actual: $<span id="precioActual">0</span></p>
<p>Total a cobrar: $<span id="totalCobro">0</span></p>

<button onclick="registrarVenta()">Confirmar Venta</button>

</div>

<hr>

<h3>Total vendido hoy: $<span id="totalDia">0</span></h3>

<button onclick="cerrarDia()">Registrar Cierre</button>
<p id="cierreInfo"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSZucWCiY1C24XTVDu1MtC0ZRWZjmHSC0",
  authDomain: "sistema-vivero.firebaseapp.com",
  databaseURL: "https://sistema-vivero-default-rtdb.firebaseio.com",
  projectId: "sistema-vivero",
  storageBucket: "sistema-vivero.firebasestorage.app",
  messagingSenderId: "325664184257",
  appId: "1:325664184257:web:8af25c6bdb65b51623c140"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* EMPLEADOS */
const empleados = ["Emp1","Emp2","Emp3"];
const claveEmpleado = "ViverosRDMempl";

/* DATOS */
let plantas = {};
let ventas = [];
let descuentosAutorizados = {};

let empleadoActual = null;
let precioModificado = null;

/* TOGGLE VISUAL */
window.toggleSeccion = function(id){
    document.getElementById(id).classList.toggle("hidden");
}

/* TIEMPO REAL */
function escucharCambios(){
    const dbRef = ref(db);
    onValue(dbRef, (snapshot) => {
        if(snapshot.exists()){
            const data = snapshot.val();
            plantas = data.plantas || {};
            ventas = data.ventas || [];
            descuentosAutorizados = data.descuentos || {};
            cargarStock();
            actualizarSelect();
            calcularTotalDia();
        }
    });
}

/* LOGIN */
window.login = function(){
    let user = document.getElementById("usuario").value;
    let pass = document.getElementById("clave").value;

    if(!empleados.includes(user) || pass !== claveEmpleado){
        document.getElementById("error").innerText="Credenciales incorrectas";
        return;
    }

    empleadoActual = user;

    let ahora = new Date();
    document.getElementById("horaEntrada").innerText = ahora.toLocaleString();

    document.getElementById("empleadoActivo").innerText = user;
    document.getElementById("loginDiv").classList.add("hidden");
    document.getElementById("sistema").classList.remove("hidden");

    escucharCambios();
}

/* STOCK */
function cargarStock(){
    let div = document.getElementById("stock");
    div.innerHTML="";
    for(let nombre in plantas){
        div.innerHTML += nombre+" - Stock: "+plantas[nombre].inventario+"<br>";
    }
}

function actualizarSelect(){
    let select = document.getElementById("plantaVenta");
    select.innerHTML="";
    for(let nombre in plantas){
        let option = document.createElement("option");
        option.value=nombre;
        option.text=nombre;
        select.appendChild(option);
    }
    actualizarPrecio();
}

document.getElementById("plantaVenta").addEventListener("change", actualizarPrecio);
document.getElementById("cantidadVenta").addEventListener("input", calcularTotal);

function actualizarPrecio(){
    let nombre = document.getElementById("plantaVenta").value;
    if(!plantas[nombre]) return;
    precioModificado = plantas[nombre].precio;
    document.getElementById("precioActual").innerText = precioModificado;
    calcularTotal();
}

function calcularTotal(){
    let cantidad = parseInt(document.getElementById("cantidadVenta").value) || 0;
    document.getElementById("totalCobro").innerText = cantidad * precioModificado;
}

/* DESCUENTO */
window.mostrarDescuento = function(){
    document.getElementById("descuentoBox").classList.toggle("hidden");
}

window.activarDescuento = function(){
    let clave = document.getElementById("claveDescuento").value;
    let nombre = document.getElementById("plantaVenta").value;

    if(descuentosAutorizados[nombre] && descuentosAutorizados[nombre].clave === clave){
        precioModificado = descuentosAutorizados[nombre].nuevoPrecio;
        document.getElementById("precioActual").innerText = precioModificado;
        calcularTotal();
        alert("Descuento aplicado");
    }else{
        alert("Clave incorrecta o no autorizada");
    }
}

/* REGISTRAR VENTA */
window.registrarVenta = async function(){
    let nombre = document.getElementById("plantaVenta").value;
    let cantidad = parseInt(document.getElementById("cantidadVenta").value);

    if(!plantas[nombre] || cantidad<=0) return;
    if(plantas[nombre].inventario < cantidad) return;

    plantas[nombre].inventario -= cantidad;

    let venta = {
        nombre,
        cantidad,
        precio: precioModificado,
        total: cantidad*precioModificado,
        fecha: new Date().toLocaleString(),
        empleado: empleadoActual
    };

    ventas.push(venta);

    await update(ref(db), {
        plantas: plantas,
        ventas: ventas
    });

    alert("Venta registrada");
}

/* TOTAL DIA */
function calcularTotalDia(){
    let hoy = new Date().toLocaleDateString();
    let total = ventas
        .filter(v => new Date(v.fecha).toLocaleDateString() === hoy)
        .reduce((sum,v)=>sum+v.total,0);

    document.getElementById("totalDia").innerText = total;
}

/* CIERRE */
window.cerrarDia = function(){
    let cierre = "Cierre registrado: "+new Date().toLocaleString();
    document.getElementById("cierreInfo").innerText = cierre;
}

</script>

</body>
</html>
